name: Publish JavaSwing PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "fastparse-language-javaswing package version"
        required: true
        default: "0.1.0"
      core_version:
        description: "fastparse dependency version"
        required: true
        default: "0.1.0"
      publish:
        description: "Publish to PyPI after validation"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "javaswing-v*"

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve JavaSwing release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      core_version: ${{ steps.resolve.outputs.core_version }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "core_version=${{ inputs.core_version }}" >> "$GITHUB_OUTPUT"
            echo "publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#javaswing-v}" >> "$GITHUB_OUTPUT"
            echo "core_version=0.1.0" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  javaswing-language-wheel:
    name: JavaSwing PyPI wheel ${{ matrix.platform }}
    needs: resolve-version
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            platform_tag: manylinux2014_x86_64
            linux_container: true
          - runner: macos-15-intel
            platform: macos-x64
            platform_tag: macosx_10_15_x86_64
            linux_container: false
          - runner: macos-14
            platform: macos-arm64
            platform_tag: macosx_11_0_arm64
            linux_container: false
          - runner: windows-latest
            platform: windows-x64
            platform_tag: win_amd64
            linux_container: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux JavaSwing language wheel
        if: matrix.linux_container
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/package_python_language_wheel.py
          --language javaswing
          --version "${{ needs.resolve-version.outputs.version }}"
          --core-version "${{ needs.resolve-version.outputs.core_version }}"
          --platform-tag "${{ matrix.platform_tag }}"
          --output-dir /io/dist/python-languages

      - name: Fix manylinux JavaSwing dist permissions
        if: matrix.linux_container
        run: sudo chown -R "$USER" dist

      - name: Build platform JavaSwing language wheel
        if: ${{ !matrix.linux_container }}
        run: >
          python scripts/package_python_language_wheel.py
          --language javaswing
          --version "${{ needs.resolve-version.outputs.version }}"
          --core-version "${{ needs.resolve-version.outputs.core_version }}"
          --platform-tag "${{ matrix.platform_tag }}"

      - name: Download published fastparse core wheel
        shell: bash
        run: |
          mkdir -p dist/python-core
          python -m pip download \
            --only-binary=:all: \
            --dest dist/python-core \
            "fastparse==${{ needs.resolve-version.outputs.core_version }}"

      - name: Validate JavaSwing language wheel
        shell: bash
        run: |
          core_wheel="$(find dist/python-core -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          language_wheel="$(find dist/python-languages -maxdepth 1 -name 'fastparse_language_javaswing-*.whl' | head -n 1)"
          python scripts/validate_python_language_wheel.py "$core_wheel" "$language_wheel" --language javaswing

      - name: Upload JavaSwing language wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-javaswing-${{ needs.resolve-version.outputs.version }}-wheel-${{ matrix.platform }}
          path: dist/python-languages/*.whl

  publish-pypi-javaswing:
    name: Publish JavaSwing PyPI
    needs:
      - resolve-version
      - javaswing-language-wheel
    runs-on: ubuntu-latest
    if: needs.resolve-version.outputs.publish == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download JavaSwing language wheels
        uses: actions/download-artifact@v4
        with:
          path: python-language-dist
          pattern: fastparse-language-javaswing-*-wheel-*
          merge-multiple: true

      - name: Publish JavaSwing language wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-language-dist

  published-pypi-javaswing-smoke:
    name: Published JavaSwing PyPI smoke ${{ matrix.platform }}
    needs:
      - resolve-version
      - publish-pypi-javaswing
    if: needs.resolve-version.outputs.publish == 'true'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
          - runner: macos-14
            platform: macos-arm64
          - runner: macos-15-intel
            platform: macos-x64
          - runner: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate published PyPI JavaSwing language package
        run: python scripts/validate_published_pypi_language.py --version "${{ needs.resolve-version.outputs.version }}" --language javaswing
