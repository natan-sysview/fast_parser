name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native library
        run: cmake --build build --config Release --verbose

      - name: Run C tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Run Python contract tests
        run: python3 -m unittest discover -s tests -v

      - name: Build C# binding example
        run: |
          dotnet build examples/csharp/01_parse_string/FastParse.ParseStringExample.csproj
          dotnet build examples/csharp/02_binary_decode/FastParse.BinaryDecodeExample.csproj

      - name: Run C# binding tests
        run: dotnet test tests/csharp/FastParse.Tests/FastParse.Tests.csproj --configuration Release --verbosity normal
