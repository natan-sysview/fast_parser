      - name: Download Java Frameworks language extension archives
        uses: actions/download-artifact@v4
        with:
          path: language-artifacts
          pattern: fastparse-language-java-frameworks-*
          merge-multiple: true

      - name: Download core NuGet package
        uses: actions/download-artifact@v4
        with:
