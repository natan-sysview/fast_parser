name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 0.1.0-preview.10
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: macos-14
            platform: macos
            arch: arm64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: windows-latest
            platform: windows
            arch: x64
            archive_ext: zip
            archive_glob: dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native
        run: cmake --build build --config Release

      - name: Test native
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test Python binding
        run: python3 -m unittest discover -s tests -v
        if: runner.os != 'Windows'

      - name: Test Python binding
        run: python -m unittest discover -s tests -v
        if: runner.os == 'Windows'

      - name: Build C# example
        run: |
          dotnet build examples/csharp/01_parse_string/FastParse.ParseStringExample.csproj
          dotnet build examples/csharp/02_binary_decode/FastParse.BinaryDecodeExample.csproj

      - name: Test C# binding
        run: dotnet test tests/csharp/FastParse.Tests/FastParse.Tests.csproj --configuration Release --verbosity normal

      - name: Package
        run: >
          python scripts/package_release.py
          --version ${{ steps.version.outputs.value }}
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --skip-build

      - name: Validate package
        run: >
          python scripts/validate_release_package.py
          "dist/fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          --platform ${{ matrix.platform }}
        if: runner.os != 'Windows'

      - name: Validate package
        run: >
          python scripts/validate_release_package.py
          "dist/fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          --platform ${{ matrix.platform }}
          --skip-example
        if: runner.os == 'Windows'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.archive_glob }}

  nuget-package:
    name: NuGet Package
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download native archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Build NuGet package
        shell: bash
        run: |
          archives=()
          while IFS= read -r -d '' archive; do
            archives+=(--archive "$archive")
          done < <(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0)
          python scripts/package_nuget.py --version "${{ steps.version.outputs.value }}" "${archives[@]}"

      - name: Validate NuGet package
        run: python scripts/validate_nuget_package.py "dist/nuget/FastParser.${{ steps.version.outputs.value }}.nupkg"

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: NATANBARRON
        if: startsWith(github.ref, 'refs/tags/')

      - name: Publish NuGet package
        run: >
          dotnet nuget push
          "dist/nuget/FastParser.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/')

      - name: Publish NuGet symbols
        run: >
          dotnet nuget push
          "dist/nuget/FastParser.${{ steps.version.outputs.value }}.snupkg"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/')

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-nuget
          path: |
            dist/nuget/*.nupkg
            dist/nuget/*.snupkg

  python-wheel:
    name: Python Wheel ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            platform_tag: manylinux2014_x86_64
            linux_container: true
          - runner: macos-15-intel
            platform: macos-x64
            platform_tag: macosx_10_15_x86_64
            linux_container: false
          - runner: macos-14
            platform: macos-arm64
            platform_tag: macosx_11_0_arm64
            linux_container: false
          - runner: windows-latest
            platform: windows-x64
            platform_tag: win_amd64
            linux_container: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manylinux wheel
        if: matrix.linux_container
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/package_python_wheel.py
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"
          --output-dir /io/dist/python

      - name: Fix manylinux dist permissions
        if: matrix.linux_container
        run: sudo chown -R "$USER" dist

      - name: Build platform wheel
        if: ${{ !matrix.linux_container }}
        run: >
          python scripts/package_python_wheel.py
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"

      - name: Validate manylinux wheel
        if: matrix.linux_container
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/validate_python_wheel.py
          "$(find dist/python -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"

      - name: Validate platform wheel
        if: ${{ !matrix.linux_container }}
        shell: bash
        run: |
          wheel="$(find dist/python -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          python scripts/validate_python_wheel.py "$wheel"

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-python-${{ matrix.platform }}
          path: dist/python/*.whl

  language-extension:
    name: Language Extension python ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: macos-14
            platform: macos
            arch: arm64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: windows-latest
            platform: windows
            arch: x64
            archive_ext: zip
            archive_glob: dist/languages/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and package Python language extension
        run: >
          python scripts/package_language_extension.py
          --language python
          --version "${{ steps.version.outputs.value }}"
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}

      - name: Upload language extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-python-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.archive_glob }}

  java-frameworks-language-extension:
    name: Language Extension java-frameworks ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: macos-14
            platform: macos
            arch: arm64
            archive_ext: tar.gz
            archive_glob: dist/languages/*.tar.gz
          - runner: windows-latest
            platform: windows
            arch: x64
            archive_ext: zip
            archive_glob: dist/languages/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and package Java Frameworks language extension
        run: >
          python scripts/package_language_extension.py
          --language java-frameworks
          --version "${{ steps.version.outputs.value }}"
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}

      - name: Upload Java Frameworks language extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-java-frameworks-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.archive_glob }}

  python-language-wheel:
    name: Python Language Wheel python ${{ matrix.platform }}
    needs: python-wheel
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            platform_tag: manylinux2014_x86_64
            linux_container: true
          - runner: macos-15-intel
            platform: macos-x64
            platform_tag: macosx_10_15_x86_64
            linux_container: false
          - runner: macos-14
            platform: macos-arm64
            platform_tag: macosx_11_0_arm64
            linux_container: false
          - runner: windows-latest
            platform: windows-x64
            platform_tag: win_amd64
            linux_container: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manylinux language wheel
        if: matrix.linux_container
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/package_python_language_wheel.py
          --language python
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"
          --output-dir /io/dist/python-languages

      - name: Fix manylinux language dist permissions
        if: matrix.linux_container
        run: sudo chown -R "$USER" dist

      - name: Build platform language wheel
        if: ${{ !matrix.linux_container }}
        run: >
          python scripts/package_python_language_wheel.py
          --language python
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"

      - name: Download core Python wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-python-${{ matrix.platform }}
          path: dist/python-core

      - name: Validate manylinux language wheel
        if: matrix.linux_container
        shell: bash
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/validate_python_language_wheel.py
          "$(find dist/python-core -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          "$(find dist/python-languages -maxdepth 1 -name 'fastparse_language_python-*.whl' | head -n 1)"

      - name: Validate platform language wheel
        if: ${{ !matrix.linux_container }}
        shell: bash
        run: |
          core_wheel="$(find dist/python-core -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          language_wheel="$(find dist/python-languages -maxdepth 1 -name 'fastparse_language_python-*.whl' | head -n 1)"
          python scripts/validate_python_language_wheel.py "$core_wheel" "$language_wheel"

      - name: Upload Python language wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-python-${{ steps.version.outputs.value }}-wheel-${{ matrix.platform }}
          path: dist/python-languages/*.whl

  java-frameworks-language-wheel:
    name: Python Language Wheel java-frameworks ${{ matrix.platform }}
    needs: python-wheel
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            platform_tag: manylinux2014_x86_64
            linux_container: true
          - runner: macos-15-intel
            platform: macos-x64
            platform_tag: macosx_10_15_x86_64
            linux_container: false
          - runner: macos-14
            platform: macos-arm64
            platform_tag: macosx_11_0_arm64
            linux_container: false
          - runner: windows-latest
            platform: windows-x64
            platform_tag: win_amd64
            linux_container: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manylinux Java Frameworks language wheel
        if: matrix.linux_container
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/package_python_language_wheel.py
          --language java-frameworks
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"
          --output-dir /io/dist/python-languages

      - name: Fix manylinux Java Frameworks dist permissions
        if: matrix.linux_container
        run: sudo chown -R "$USER" dist

      - name: Build platform Java Frameworks language wheel
        if: ${{ !matrix.linux_container }}
        run: >
          python scripts/package_python_language_wheel.py
          --language java-frameworks
          --version "${{ steps.version.outputs.value }}"
          --platform-tag "${{ matrix.platform_tag }}"

      - name: Download core Python wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-python-${{ matrix.platform }}
          path: dist/python-core

      - name: Validate manylinux Java Frameworks language wheel
        if: matrix.linux_container
        shell: bash
        run: >
          docker run --rm
          -v "$PWD:/io"
          -w /io
          quay.io/pypa/manylinux2014_x86_64
          /opt/python/cp312-cp312/bin/python
          scripts/validate_python_language_wheel.py
          "$(find dist/python-core -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          "$(find dist/python-languages -maxdepth 1 -name 'fastparse_language_java_frameworks-*.whl' | head -n 1)"
          --language java-frameworks

      - name: Validate platform Java Frameworks language wheel
        if: ${{ !matrix.linux_container }}
        shell: bash
        run: |
          core_wheel="$(find dist/python-core -maxdepth 1 -name 'fastparse-*.whl' | head -n 1)"
          language_wheel="$(find dist/python-languages -maxdepth 1 -name 'fastparse_language_java_frameworks-*.whl' | head -n 1)"
          python scripts/validate_python_language_wheel.py "$core_wheel" "$language_wheel" --language java-frameworks

      - name: Upload Java Frameworks language wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-java-frameworks-${{ steps.version.outputs.value }}-wheel-${{ matrix.platform }}
          path: dist/python-languages/*.whl

  nuget-language-package:
    name: NuGet Language Package Python
    needs:
      - language-extension
      - nuget-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download language extension archives
        uses: actions/download-artifact@v4
        with:
          path: language-artifacts
          pattern: fastparse-language-python-*
          merge-multiple: true

      - name: Download core NuGet package
        uses: actions/download-artifact@v4
        with:
          path: nuget-artifacts
          name: fastparse-${{ steps.version.outputs.value }}-nuget

      - name: Build NuGet language package
        shell: bash
        run: |
          archives=()
          while IFS= read -r -d '' archive; do
            archives+=(--archive "$archive")
          done < <(find language-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0)
          python scripts/package_nuget_language_extension.py --language python --version "${{ steps.version.outputs.value }}" "${archives[@]}"

      - name: Validate NuGet language package
        shell: bash
        run: |
          core_package="$(find nuget-artifacts -maxdepth 1 -name 'FastParser.*.nupkg' ! -name '*.snupkg' | head -n 1)"
          language_package="dist/nuget-languages/FastParser.Language.Python.${{ steps.version.outputs.value }}.nupkg"
          python scripts/validate_nuget_language_package.py \
            --core-package "$core_package" \
            --language-package "$language_package" \
            --version "${{ steps.version.outputs.value }}"

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: NATANBARRON
        if: startsWith(github.ref, 'refs/tags/') && vars.NUGET_LANGUAGE_PYTHON_PUBLISH == 'true'

      - name: Publish NuGet language package
        run: >
          dotnet nuget push
          "dist/nuget-languages/FastParser.Language.Python.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/') && vars.NUGET_LANGUAGE_PYTHON_PUBLISH == 'true'

      - name: Upload NuGet language package artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-language-python-${{ steps.version.outputs.value }}-nuget
          path: dist/nuget-languages/*.nupkg

  nuget-language-java-frameworks-package:
