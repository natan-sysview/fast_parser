          name: fastparse-${{ steps.version.outputs.value }}-nuget

      - name: Build NuGet Java Frameworks language package
        shell: bash
        run: |
          archives=()
          while IFS= read -r -d '' archive; do
            archives+=(--archive "$archive")
          done < <(find language-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0)
          python scripts/package_nuget_language_extension.py --language java-frameworks --version "${{ steps.version.outputs.value }}" --require-all-rids "${archives[@]}"

      - name: Validate NuGet Java Frameworks language package
        shell: bash
        run: |
          core_package="$(find nuget-artifacts -maxdepth 1 -name 'FastParser.*.nupkg' ! -name '*.snupkg' | head -n 1)"
          language_package="dist/nuget-languages/FastParser.Language.JavaFrameworks.${{ steps.version.outputs.value }}.nupkg"
          python scripts/validate_nuget_language_package.py \
            --core-package "$core_package" \
            --language-package "$language_package" \
            --version "${{ steps.version.outputs.value }}" \
            --language java-frameworks

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: NATANBARRON
        if: startsWith(github.ref, 'refs/tags/') && vars.NUGET_LANGUAGE_JAVA_FRAMEWORKS_PUBLISH == 'true'

      - name: Publish NuGet Java Frameworks language package
        run: >
          dotnet nuget push
          "dist/nuget-languages/FastParser.Language.JavaFrameworks.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/') && vars.NUGET_LANGUAGE_JAVA_FRAMEWORKS_PUBLISH == 'true'

      - name: Upload NuGet Java Frameworks language package artifact
