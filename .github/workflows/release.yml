name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 0.1.0-preview
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            archive_glob: dist/*.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x64
            archive_glob: dist/*.tar.gz
          - runner: macos-14
            platform: macos
            arch: arm64
            archive_glob: dist/*.tar.gz
          - runner: windows-latest
            platform: windows
            arch: x64
            archive_glob: dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native
        run: cmake --build build --config Release

      - name: Test native
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test Python binding
        run: python3 -m unittest discover -s tests -v
        if: runner.os != 'Windows'

      - name: Test Python binding
        run: python -m unittest discover -s tests -v
        if: runner.os == 'Windows'

      - name: Build C# example
        run: dotnet build examples/csharp/01_parse_string/FastParse.ParseStringExample.csproj

      - name: Package
        run: >
          python scripts/package_release.py
          --version ${{ steps.version.outputs.value }}
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --skip-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.archive_glob }}

  github-release:
    name: Attach To GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
