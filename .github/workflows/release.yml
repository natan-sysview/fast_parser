name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 0.1.0-preview.2
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: macos-14
            platform: macos
            arch: arm64
            archive_ext: tar.gz
            archive_glob: dist/*.tar.gz
          - runner: windows-latest
            platform: windows
            arch: x64
            archive_ext: zip
            archive_glob: dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native
        run: cmake --build build --config Release

      - name: Test native
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test Python binding
        run: python3 -m unittest discover -s tests -v
        if: runner.os != 'Windows'

      - name: Test Python binding
        run: python -m unittest discover -s tests -v
        if: runner.os == 'Windows'

      - name: Build C# example
        run: |
          dotnet build examples/csharp/01_parse_string/FastParse.ParseStringExample.csproj
          dotnet build examples/csharp/02_binary_decode/FastParse.BinaryDecodeExample.csproj

      - name: Package
        run: >
          python scripts/package_release.py
          --version ${{ steps.version.outputs.value }}
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --skip-build

      - name: Validate package
        run: >
          python scripts/validate_release_package.py
          "dist/fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          --platform ${{ matrix.platform }}
        if: runner.os != 'Windows'

      - name: Validate package
        run: >
          python scripts/validate_release_package.py
          "dist/fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          --platform ${{ matrix.platform }}
          --skip-example
        if: runner.os == 'Windows'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.archive_glob }}

  nuget-package:
    name: NuGet Package
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download native archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Build NuGet package
        shell: bash
        run: |
          archives=()
          while IFS= read -r -d '' archive; do
            archives+=(--archive "$archive")
          done < <(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0)
          python scripts/package_nuget.py --version "${{ steps.version.outputs.value }}" "${archives[@]}"

      - name: Validate NuGet package
        run: python scripts/validate_nuget_package.py "dist/nuget/FastParser.${{ steps.version.outputs.value }}.nupkg"

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: NATANBARRON
        if: startsWith(github.ref, 'refs/tags/')

      - name: Publish NuGet package
        run: >
          dotnet nuget push
          "dist/nuget/FastParser.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/')

      - name: Validate published NuGet package
        run: python scripts/validate_published_nuget.py --version "${{ steps.version.outputs.value }}"
        if: startsWith(github.ref, 'refs/tags/')

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastparse-${{ steps.version.outputs.value }}-nuget
          path: dist/nuget/*.nupkg

  github-release:
    name: Attach To GitHub Release
    needs:
      - package
      - nuget-package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          python3 -c "import hashlib, pathlib; files=sorted(p for p in pathlib.Path('.').iterdir() if p.is_file() and p.name != 'SHA256SUMS.txt'); pathlib.Path('SHA256SUMS.txt').write_text(''.join(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n' for p in files), encoding='utf-8')"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
